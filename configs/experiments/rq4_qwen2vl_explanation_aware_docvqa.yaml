# RQ4/RQ7 · Qwen2-VL-2B · answer-only fallback · DocVQA
#
# Document-domain run. The HuggingFaceM4/DocumentVQA mirror exposes labeled
# validation data and a test split whose labels may be held back, so the paper
# run uses disjoint validation slices: the first 80% for adapter training and the
# last 20% for held-out evaluation. DocVQA has no gold rationales, so this is
# intentionally an answer-only/generative fallback run, not explanation-aware
# rationale supervision.

name: rq4_qwen2vl_explanation_aware_docvqa
rq: RQ4
seed: 42

model:
  name: qwen2_vl
  pretrained: Qwen/Qwen2-VL-2B-Instruct
  dtype: bfloat16
  use_qlora: true

data:
  name: docvqa
  split_train: validation[:80%]
  split_eval: validation[80%:]
  max_train: 2000
  max_eval: 200
  prompt_variant: answer_only
  max_length: 2048

objective:
  name: generative

train:
  epochs: 1
  batch_size: 4
  grad_accum_steps: 8
  lr: 2.0e-4
  scheduler: cosine
  warmup_ratio: 0.03

eval:
  metrics: [anls, exact_match]
  cot: false
  max_length: 2048
  max_new_tokens: 48

wandb:
  tags: [rq4, rq7, qwen2_vl, docvqa, document-domain]
