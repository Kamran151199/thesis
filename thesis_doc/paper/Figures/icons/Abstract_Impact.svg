<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1250" viewBox="0 0 1800 1250" role="img" aria-labelledby="title desc">
  <title id="title">Controlled VLM alignment for grounded reasoning</title>
  <desc id="desc">Graphical abstract showing problem, controlled study, evaluation axes, and research impact.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#173B63"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #F8FAFC; }
      .page { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 2.2; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 44px; font-weight: 800; fill: #0F172A; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 23px; font-weight: 500; fill: #334155; }
      .card { fill: #FFFFFF; stroke-width: 3; rx: 18; filter: url(#shadow); }
      .head { font-family: Arial, Helvetica, sans-serif; font-size: 27px; font-weight: 800; fill: #FFFFFF; }
      .hnum { font-family: Arial, Helvetica, sans-serif; font-size: 27px; font-weight: 800; fill: #0F172A; }
      .body { font-family: Arial, Helvetica, sans-serif; font-size: 23px; font-weight: 500; fill: #1E293B; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 19px; font-weight: 500; fill: #334155; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; fill: #475569; letter-spacing: 0.3px; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 800; fill: #0F172A; }
      .impact { font-family: Arial, Helvetica, sans-serif; font-size: 25px; font-weight: 800; fill: #0F172A; }
      .impactText { font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 500; fill: #243447; }
      .footer { font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 800; fill: #173B63; }
      .footerSmall { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 600; fill: #334155; }
      .arrowLine { stroke: #173B63; stroke-width: 8; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .softLine { stroke: #94A3B8; stroke-width: 3; fill: none; stroke-linecap: round; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1250"/>
  <rect class="page" x="34" y="30" width="1732" height="1190" rx="18"/>

  <text class="title" x="900" y="86" text-anchor="middle">Controlled VLM alignment for grounded reasoning</text>
  <text class="subtitle" x="900" y="124" text-anchor="middle">same budget, same runner, same data caps - only the training signal changes</text>

  <!-- Main cards -->
  <g transform="translate(60,170)">
    <rect class="card" x="0" y="0" width="390" height="330" stroke="#C2410C"/>
    <rect x="0" y="0" width="390" height="76" rx="18" fill="#C2410C"/>
    <circle cx="45" cy="38" r="26" fill="#FFFFFF"/>
    <text class="hnum" x="45" y="47" text-anchor="middle" fill="#C2410C">1</text>
    <text class="head" x="86" y="46">Problem</text>

    <!-- icons -->
    <g transform="translate(42,106)" stroke="#173B63" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="0" width="64" height="80" rx="8" fill="#EFF6FF"/>
      <path d="M16 20 H48 M16 38 H48 M16 56 H34"/>
      <rect x="108" y="12" width="82" height="58" rx="8" fill="#F0FDFA"/>
      <path d="M126 54 L146 34 L164 48 L178 28"/>
      <path d="M126 22 H178"/>
      <rect x="232" y="4" width="82" height="70" rx="10" fill="#ECFDF5"/>
      <circle cx="272" cy="33" r="13" fill="#FBBF24" stroke="#C2410C"/>
      <path d="M248 62 C260 42 282 42 298 62"/>
    </g>
    <text class="body" x="195" y="226" text-anchor="middle">
      <tspan x="195" dy="0">A VLM can answer correctly</tspan>
      <tspan x="195" dy="31">while using weak or wrong</tspan>
      <tspan x="195" dy="31">visual evidence.</tspan>
    </text>
  </g>

  <path class="arrowLine" d="M 474 335 H 565"/>

  <g transform="translate(590,170)">
    <rect class="card" x="0" y="0" width="410" height="330" stroke="#1D4ED8"/>
    <rect x="0" y="0" width="410" height="76" rx="18" fill="#1D4ED8"/>
    <circle cx="45" cy="38" r="26" fill="#FFFFFF"/>
    <text class="hnum" x="45" y="47" text-anchor="middle" fill="#1D4ED8">2</text>
    <text class="head" x="86" y="46">Controlled study</text>

    <g transform="translate(58,100)">
      <rect x="0" y="0" width="128" height="92" rx="16" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="4"/>
      <text class="label" x="64" y="38" text-anchor="middle">Qwen2-VL</text>
      <text class="small" x="64" y="66" text-anchor="middle">QLoRA</text>
      <rect x="220" y="0" width="128" height="92" rx="16" fill="#E0F2FE" stroke="#0369A1" stroke-width="4"/>
      <text class="label" x="284" y="38" text-anchor="middle">BLIP-2</text>
      <text class="small" x="284" y="66" text-anchor="middle">Q-Former</text>
      <path d="M 151 46 H 197" class="softLine"/>
      <text class="impact" x="174" y="54" text-anchor="middle">+</text>
    </g>

    <text class="body" x="205" y="236" text-anchor="middle">
      <tspan x="205" dy="0">answer-only, rationale,</tspan>
      <tspan x="205" dy="31">explanation-aware, and</tspan>
      <tspan x="205" dy="31">contrastive-enhanced signals</tspan>
    </text>
  </g>

  <path class="arrowLine" d="M 1024 335 H 1115"/>

  <g transform="translate(1140,170)">
    <rect class="card" x="0" y="0" width="310" height="330" stroke="#0F766E"/>
    <rect x="0" y="0" width="310" height="76" rx="18" fill="#0F766E"/>
    <circle cx="45" cy="38" r="26" fill="#FFFFFF"/>
    <text class="hnum" x="45" y="47" text-anchor="middle" fill="#0F766E">3</text>
    <text class="head" x="86" y="46">Evaluation</text>

    <g transform="translate(36,102)">
      <rect x="0" y="0" width="238" height="52" rx="12" fill="#ECFDF5" stroke="#0F766E" stroke-width="3"/>
      <text class="label" x="119" y="33" text-anchor="middle">Answer quality</text>
      <rect x="0" y="72" width="238" height="52" rx="12" fill="#F0FDFA" stroke="#0F766E" stroke-width="3"/>
      <text class="label" x="119" y="105" text-anchor="middle">Rationale quality</text>
      <rect x="0" y="144" width="238" height="52" rx="12" fill="#F7FEE7" stroke="#65A30D" stroke-width="3"/>
      <text class="label" x="119" y="177" text-anchor="middle">Visual sensitivity</text>
    </g>
  </g>

  <path class="arrowLine" d="M 1474 335 H 1522"/>

  <g transform="translate(1542,170)">
    <rect class="card" x="0" y="0" width="198" height="330" stroke="#7C3AED"/>
    <rect x="0" y="0" width="198" height="76" rx="18" fill="#7C3AED"/>
    <circle cx="45" cy="38" r="26" fill="#FFFFFF"/>
    <text class="hnum" x="45" y="47" text-anchor="middle" fill="#7C3AED">4</text>
    <text class="head" x="86" y="46">Impact</text>

    <g transform="translate(65,106)">
      <circle cx="34" cy="34" r="34" fill="#EDE9FE" stroke="#7C3AED" stroke-width="4"/>
      <path d="M19 35 L30 47 L52 22" fill="none" stroke="#16A34A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text class="impactText" x="99" y="206" text-anchor="middle">
      <tspan x="99" dy="0">Do not</tspan>
      <tspan x="99" dy="29">trust</tspan>
      <tspan x="99" dy="29">accuracy</tspan>
      <tspan x="99" dy="29">alone.</tspan>
    </text>
  </g>

  <!-- Takeaway row -->
  <g transform="translate(75,555)">
    <rect x="0" y="0" width="1650" height="300" rx="18" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="3"/>
    <text class="impact" x="825" y="52" text-anchor="middle">What the study makes visible</text>

    <g transform="translate(52,88)">
      <rect x="0" y="0" width="470" height="170" rx="16" fill="#FFF7ED" stroke="#FB923C" stroke-width="3"/>
      <text class="impact" x="235" y="34" text-anchor="middle">
        <tspan x="235" dy="0">Explanations are not</tspan>
        <tspan x="235" dy="29">grounding by default</tspan>
      </text>
      <text class="impactText" x="235" y="100" text-anchor="middle">
        <tspan x="235" dy="0">Better rationale text can move separately</tspan>
        <tspan x="235" dy="29">from masking-based visual sensitivity.</tspan>
      </text>
    </g>

    <g transform="translate(590,88)">
      <rect x="0" y="0" width="470" height="170" rx="16" fill="#EFF6FF" stroke="#60A5FA" stroke-width="3"/>
      <text class="impact" x="235" y="45" text-anchor="middle">Controls prevent over-crediting</text>
      <text class="impactText" x="235" y="93" text-anchor="middle">
        <tspan x="235" dy="0">Answer-only and generative controls show</tspan>
        <tspan x="235" dy="29">what the extra objective really adds.</tspan>
      </text>
    </g>

    <g transform="translate(1128,88)">
      <rect x="0" y="0" width="470" height="170" rx="16" fill="#F0FDF4" stroke="#22C55E" stroke-width="3"/>
      <text class="impact" x="235" y="45" text-anchor="middle">Reusable single-GPU protocol</text>
      <text class="impactText" x="235" y="93" text-anchor="middle">
        <tspan x="235" dy="0">Configs, split audits, artifacts, and claims</tspan>
        <tspan x="235" dy="29">are tied together before reporting.</tspan>
      </text>
    </g>
  </g>

  <g transform="translate(110,895)">
    <rect x="0" y="0" width="1580" height="255" rx="18" fill="#FFFBEB" stroke="#F59E0B" stroke-width="3"/>
    <text class="footer" x="790" y="44" text-anchor="middle">Impact for the study</text>

    <g transform="translate(55,76)">
      <rect x="0" y="0" width="450" height="135" rx="15" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2.5"/>
      <text class="impact" x="225" y="39" text-anchor="middle">Safer interpretation</text>
      <text class="impactText" x="225" y="78" text-anchor="middle">
        <tspan x="225" dy="0">Accuracy, rationale quality, and</tspan>
        <tspan x="225" dy="29">visual sensitivity are not merged.</tspan>
      </text>
    </g>

    <g transform="translate(565,76)">
      <rect x="0" y="0" width="450" height="135" rx="15" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2.5"/>
      <text class="impact" x="225" y="39" text-anchor="middle">Cleaner claims</text>
      <text class="impactText" x="225" y="78" text-anchor="middle">
        <tspan x="225" dy="0">Every conclusion is tied back to</tspan>
        <tspan x="225" dy="29">a control, table, or artifact.</tspan>
      </text>
    </g>

    <g transform="translate(1075,76)">
      <rect x="0" y="0" width="450" height="135" rx="15" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2.5"/>
      <text class="impact" x="225" y="39" text-anchor="middle">Reusable protocol</text>
      <text class="impactText" x="225" y="78" text-anchor="middle">
        <tspan x="225" dy="0">The pipeline can be rerun by a</tspan>
        <tspan x="225" dy="29">student lab on one GPU.</tspan>
      </text>
    </g>
  </g>

  <g transform="translate(110,1168)">
    <rect x="0" y="0" width="1580" height="48" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3"/>
    <text class="footerSmall" x="790" y="31" text-anchor="middle">Main message: do not judge grounded reasoning from final answer accuracy alone.</text>
  </g>
</svg>
