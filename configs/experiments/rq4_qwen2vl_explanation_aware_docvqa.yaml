# RQ4/RQ7 · Qwen2-VL-2B · answer-only fallback · DocVQA
#
# Document-domain run. DocVQA has no gold rationales, so the explanation-aware
# template falls back to an answer-only target per example; the config name keeps
# it grouped with the domain-comparison lane, but result interpretation must not
# claim rationale supervision for this dataset.

name: rq4_qwen2vl_explanation_aware_docvqa
rq: RQ4
seed: 42

model:
  name: qwen2_vl
  pretrained: Qwen/Qwen2-VL-2B-Instruct
  dtype: bfloat16
  use_qlora: true

data:
  name: docvqa
  split_train: train
  split_eval: validation
  max_train: 2000
  max_eval: 200
  prompt_variant: explanation_then_answer
  max_length: 2048

objective:
  name: explanation_aware
  alpha: 0.5

train:
  epochs: 1
  batch_size: 4
  grad_accum_steps: 8
  lr: 2.0e-4
  scheduler: cosine
  warmup_ratio: 0.03

eval:
  metrics: [anls, exact_match]
  cot: true

wandb:
  tags: [rq4, rq7, qwen2_vl, docvqa, document-domain]
